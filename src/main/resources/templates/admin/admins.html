<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Quản lý Quản trị viên - Blog</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">⚙️ Quản lý Quản trị viên</div>
            <a th:href="@{/admin}" class="back-link" style="color:#fff;">← Dashboard</a>
        </div>
    </header>

    <main class="admin-shell admin-layout">
        <section class="admin-table-wrap">
            <h2>🔐 Danh sách quản trị viên</h2>
            <table>
                <tr>
                    <th>ID</th>
                    <th>Tên đăng nhập</th>
                    <th>Email</th>
                    <th>Hành động</th>
                </tr>
                <tr th:each="admin : ${admins}">
                    <td th:text="${admin.id}"></td>
                    <td th:text="${admin.username}"></td>
                    <td th:text="${admin.email}"></td>
                    <td>
                        <form th:action="@{/admin/admins/{id}/delete(id=${admin.id})}" method="post" class="inline-form">
                            <button type="submit" class="danger">Xóa</button>
                        </form>
                    </td>
                </tr>
            </table>
        </section>

        <section class="admin-form">
            <h3>➕ Thêm quản trị viên mới</h3>
            <form th:action="@{/admin/admins}" method="post" th:object="${newAdmin}">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" th:field="*{username}" required>

                <label for="password" style="margin-top:8px;display:block;">Mật khẩu</label>
                <input type="password" id="password" th:field="*{password}" required>

                <label for="name" style="margin-top:8px;display:block;">Tên hiển thị</label>
                <input type="text" id="name" th:field="*{name}" required>

                <label for="email" style="margin-top:8px;display:block;">Email</label>
                <input type="email" id="email" th:field="*{email}" required>

                <button type="submit" style="margin-top:10px;">✓ Thêm quản trị viên</button>
            </form>
        </section>
    </main>
</body>
</html>
