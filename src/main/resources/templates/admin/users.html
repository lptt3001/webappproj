<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👥 Quản lý Người dùng - Blog</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">⚙️ Quản lý Người dùng</div>
            <a th:href="@{/admin}" class="back-link" style="color:#fff;">← Dashboard</a>
        </div>
    </header>

    <main class="admin-shell">
        <section class="admin-table-wrap">
            <h2>👥 Quản lý người dùng</h2>
            <table>
                <tr>
                    <th>ID</th>
                    <th>Tên đăng nhập</th>
                    <th>Email</th>
                    <th>Vai trò</th>
                    <th>Hành động</th>
                </tr>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}"></td>
                    <td th:text="${user.username}"></td>
                    <td th:text="${user.email}"></td>
                    <td th:text="${user.role}"></td>
                    <td>
                        <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" class="inline-form">
                            <button type="submit" class="danger">Xóa</button>
                        </form>
                    </td>
                </tr>
            </table>
        </section>
    </main>
</body>
</html>
