<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${user.name} + ' - 👤 Hồ sơ - Blog'">Người dùng - Blog</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
  <header>
    <div class="header-container">
      <div class="logo">Blog</div>
      <a th:href="@{/}" class="back-link">Trang chu</a>
    </div>
  </header>

  <div class="container two-col">
    <aside class="sidebar">
      <div class="user-avatar" style="height:150px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#2f8f6a,#3ba17a);border-radius:12px;color:#fff;font-size:48px;">U</div>
      <h2 th:text="${user.name}"></h2>

      <div class="info-item">
        <div class="info-label">Ten dang nhap</div>
        <div class="info-value" th:text="${user.username}"></div>
      </div>

      <div class="info-item">
        <div class="info-label">Email</div>
        <div class="info-value" th:text="${user.email}"></div>
      </div>

      <div th:if="${user.gender}" class="info-item">
        <div class="info-label">Gioi tinh</div>
        <div class="info-value" th:text="${user.gender}"></div>
      </div>

      <div th:if="${user.birth}" class="info-item">
        <div class="info-label">Ngay sinh</div>
        <div class="info-value" th:text="${#temporals.format(user.birth,'dd/MM/yyyy')}"></div>

      </div>

      <div class="mark-badge">
        Diem: <span th:text="${user.mark}"></span>
      </div>

      <a th:href="@{/}" class="back-btn">Quay lai</a>
    </aside>

    <main class="content">
      <h2>Bai viet cua <span th:text="${user.name}"></span></h2>

       <div th:if="${#lists.isEmpty(user.articles)}" class="empty-state">
         <p>📭 <span th:text="${user.name}"></span> chưa viết bài viết nào</p>
       </div>

       <div th:if="${user.articles == null or #lists.isEmpty(user.articles)}" class="empty-state">
   <p>📭 <span th:text="${user.name}"></span> chưa viết bài viết nào</p>
 </div>

     <div th:if="${user.articles != null and !#lists.isEmpty(user.articles)}" class="articles-list">
       <a th:each="article : ${user.articles}"
          th:href="@{/articles/{id}(id=${article.id})}"
          class="article-item">
         <h3 th:text="${article.title}"></h3>
         <div class="article-meta">
           <span>📅 Ngày: <span th:text="${#temporals.format(article.createdAt,'dd/MM/yyyy')}"></span></span>
           <span>❤️ Like: <span th:text="${article.likes.size()}"></span></span>
           <span>💬 Bình luận: <span th:text="${article.comments.size()}"></span></span>
         </div>
       </a>
     </div>

    </main>
  </div>
</body>

</html>
