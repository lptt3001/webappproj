<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏆 Bảng xếp hạng - Blog</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
  <header>
    <div class="header-container">
      <div class="logo">📖 Blog</div>
      <a th:href="@{/}" class="back-link" style="color:#fff;background:rgba(255,255,255,0.25);border:1px solid rgba(255,255,255,0.4);padding:10px 16px;border-radius:12px;font-weight:600;transition:all 0.3s ease;">← Trang chủ</a>
    </div>
  </header>

  <div class="container">
    <h1>🏆 Bảng xếp hạng người dùng</h1>

    <div th:if="${#lists.isEmpty(users)}" class="empty-state">
      <p>📭 Không có người dùng nào</p>
    </div>

    <div th:if="${!#lists.isEmpty(users)}" class="table-container">
      <table>
        <thead>
          <tr>
            <th width="10%">#</th>
            <th width="35%">👤 Tên người dùng</th>
            <th class="email-column" width="30%">📧 Email</th>
            <th class="gender-column" width="15%">⚧️ Giới tính</th>
            <th width="10%">⭐ Điểm</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="user, iterStat : ${users}">
            <td class="rank-column" th:text="${iterStat.index + 1}"></td>
            <td>
              <a th:href="@{/users/{id}(id=${user.id})}" th:text="${user.name}"></a>
            </td>
            <td class="email-column" th:text="${user.email}"></td>
            <td class="gender-column" th:text="${user.gender != null ? user.gender : '—'}"></td>
            <td class="mark-cell">
              <span th:text="${user.mark}"></span> ⭐
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>

</html>
