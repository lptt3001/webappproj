<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${article.title} + ' - 📖 Blog'">Chi tiết bài viết - Blog</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
  <header>
    <div class="header-container">
      <div class="logo">📖 Blog</div>
      <a th:href="@{/}" class="back-link" style="color:#fff;">← Quay lại trang chủ</a>
    </div>
  </header>

  <div class="container two-col">
    <main class="main-content">
      <div class="article-header">
        <h1 th:text="${article.title}"></h1>
        <div class="article-meta" style="color:#64748b;display:flex;gap:12px;flex-wrap:wrap;">
          <span>✍️ Tác giả: <strong th:text="${article.author.name}"></strong></span>
          <span>📅 Ngày đăng: <span th:text="${#temporals.format(article.createdAt,'dd/MM/yyyy HH:mm')}"></span></span>
          <span>📚 Chủ đề: <span th:text="${article.topics.size()}"></span></span>
        </div>
      </div>

      <div th:if="${article.topics}" class="topic-section" style="margin-bottom:16px;">
        <h4>📌 Chủ đề liên quan</h4>
        <div class="topic-list">
          <a th:each="topic : ${article.topics}"
             th:href="@{/filter(topics=${topic.id})}"
             class="topic-tag"
             th:text="${topic.name}"></a>
        </div>
      </div>

      <div class="article-body" th:utext="${article.content}"></div>

      <div class="like-section">
        <div class="like-count">❤️ <strong th:text="${article.likes.size()}"></strong> người thích</div>
        <div th:if="${isAuthenticated}" style="display:flex;gap:10px;">
          <form th:action="@{/articles/{id}/like(id=${article.id})}" method="post" style="display: contents;">
            <button type="submit"
                    class="like-button"
                    th:classappend="${userLikedArticle} ? 'like-button-active' : 'like-button-inactive'"
                    style="padding:10px 16px;border-radius:10px;border:none;cursor:pointer;font-weight:600;transition:all 0.3s;">
              <span th:text="${userLikedArticle} ? '♥️ Bỏ thích' : '🤍 Thích'"></span>
            </button>
          </form>
          <form th:action="@{/articles/{id}/report(id=${article.id})}" method="post" style="display:inline;">
            <button type="submit"
                    style="padding:10px 16px;border-radius:10px;border:1px solid #f59e0b;background:#fef3c7;color:#92400e;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:6px;">
              🚩 Báo cáo
            </button>
          </form>
        </div>
        <div th:if="${!isAuthenticated}" class="login-prompt">
          <a th:href="@{/login}">🔓 Đăng nhập để thích và báo cáo</a>
        </div>
      </div>

      <section class="comments-section">
        <h2 class="comments-header">💬 Bình luận (<span th:text="${comments.size()}"></span>)</h2>

        <div th:if="${isAuthenticated}" class="comment-form">
          <form th:action="@{/articles/{id}/comments(id=${article.id})}" method="post">
            <textarea name="content" class="comment-textarea" placeholder="Chia sẻ ý kiến của bạn..." required></textarea>
            <button type="submit" class="comment-submit">💬 Gửi bình luận</button>
          </form>
        </div>
        <div th:if="${!isAuthenticated}" class="login-prompt" style="margin-bottom: 30px;">
          <p><a th:href="@{/login}">🔓 Đăng nhập để bình luận</a></p>
        </div>

        <div th:if="${!comments.empty}" th:each="comment : ${comments}" class="comment-item">
          <div class="comment-author">
            <a th:href="@{/users/{id}(id=${comment.author.id})}" th:text="${comment.author.name}"></a>
            <span class="comment-time" th:text="${#temporals.format(comment.createdAt,'dd/MM/yyyy HH:mm')}"></span>
          </div>
          <div class="comment-content" th:text="${comment.content}"></div>
        </div>
        <div th:if="${comments.empty}" class="empty-state">
          <p>📭 Chưa có bình luận nào. Hãy là người bình luận đầu tiên!</p>
        </div>
      </section>
    </main>

    <aside class="sidebar">
      <div class="sidebar-box">
        <h3>ℹ️ Thông tin bài viết</h3>

        <div class="sidebar-item">
          <label>✍️ Tác giả</label>
          <span th:text="${article.author.name}"></span>
        </div>

        <div class="sidebar-item">
          <label>📅 Ngày đăng</label>
          <span th:text="${#temporals.format(article.createdAt,'dd/MM/yyyy')}"></span>
        </div>

        <div class="sidebar-item">
          <label>❤️ Lượt thích</label>
          <span th:text="${article.likes.size()}"></span>
        </div>

        <div th:if="${article.topics}" class="sidebar-item">
          <label>📚 Chủ đề</label>
          <div style="margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px;">
            <a th:each="t : ${article.topics}"
               th:href="@{/filter(topics=${t.id})}"
               class="topic-tag"
               style="font-size: 11px;"
               th:text="${t.name}"></a>
          </div>
        </div>
      </div>

      <a th:href="@{/}" class="back-btn">← Quay lại trang chủ</a>
    </aside>
  </div>
</body>

</html>
