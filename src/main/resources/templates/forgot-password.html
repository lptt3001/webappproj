<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔑 Quên mật khẩu - Blog</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="auth-page" style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
  <div class="login-container">
      <div class="login-header">
      <div class="logo">📖 Blog</div>
      <h2>Quên mật khẩu</h2>
      <p>Nhập email của bạn để nhận liên kết khôi phục</p>
     </div>

     <div th:if="${error}" class="error-message" th:text="${error}"></div>
     <div th:if="${success}" class="success-message" style="background: rgba(16, 185, 129, 0.1); color: var(--primary-dark); border: 1px solid rgba(16, 185, 129, 0.3); padding: 12px; border-radius: 10px; margin-top: 8px; font-size: 13px;" th:text="${success}"></div>

      <form th:if="${success == null}" th:action="@{/forgot-password}" method="post" style="display:flex;flex-direction:column;gap:12px;">
        <div class="form-group">
          <label for="email">Email đăng ký</label>
          <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
        </div>
        <button type="submit" style="width:100%;margin-top:8px;">📧 Gửi yêu cầu</button>
      </form>

     <div class="login-link">
      <p>Quay lại <a th:href="@{/login}">Đăng nhập</a></p>
     </div>
   </div>
</body>
</html>
