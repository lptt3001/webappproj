<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔓 Đăng nhập - Blog</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="auth-page" style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
  <div class="login-container">
      <div class="login-header">
      <div class="logo">📖 Blog</div>
      <h2>Đăng nhập</h2>
      <p>Tham gia cộng đồng Blog của chúng tôi</p>
     </div>

     <div th:if="${loginError}" class="error-message" th:text="${loginError}"></div>

      <form th:action="@{/login}" method="post" style="display:flex;flex-direction:column;gap:12px;">
        <div class="form-group">
          <label for="username">Tên đăng nhập</label>
          <input type="text" id="username" name="username" th:value="${param.username}" required>
        </div>
        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" style="width:100%;margin-top:8px;">🔓 Đăng nhập</button>
      </form>

     <div class="register-link">
      <p>Bạn chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a></p>
     </div>
   </div>
</body>

</html>
